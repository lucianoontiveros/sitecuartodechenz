[build]
  command = "rm -rf node_modules package-lock.json && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Desactivar prerendering heredado
[context.production]
  [context.production.environment]
    NETLIFY_ENABLE_PRERENDER = "false"

# Redirigir llamadas API a Netlify Functions (prioridad alta)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Configuración para SPA (React Router) - fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
