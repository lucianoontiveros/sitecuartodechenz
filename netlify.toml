[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Desactivar prerendering heredado
[context.production]
  [context.production.environment]
    NETLIFY_ENABLE_PRERENDER = "false"

# Configuración para SPA (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirigir llamadas API a Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Configuración de Netlify Functions
[functions]
  node_bundler = "esbuild"
